name: Release Review App

on:
  push:
    tags: ["review-v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: pnpm install

      # Build the Tauri app for both macOS arches. Each produces
      # target/<triple>/release/bundle/macos/orche-review.app
      - run: pnpm --filter @orche/review tauri build --target aarch64-apple-darwin
      - run: pnpm --filter @orche/review tauri build --target x86_64-apple-darwin

      # Package each .app as a zip the CLI downloads (review-manager.ts expects
      # "*mac*<arch>*.zip" containing orche-review.app). ditto preserves the
      # bundle structure, symlinks, and any signing.
      - name: Package
        run: |
          cd packages/review/src-tauri/target
          ditto -c -k --keepParent \
            aarch64-apple-darwin/release/bundle/macos/orche-review.app \
            "$GITHUB_WORKSPACE/orche-review-mac-arm64.zip"
          ditto -c -k --keepParent \
            x86_64-apple-darwin/release/bundle/macos/orche-review.app \
            "$GITHUB_WORKSPACE/orche-review-mac-x64.zip"

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            orche-review-mac-arm64.zip
            orche-review-mac-x64.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable

      # Tauri (wry/webkit2gtk) build dependencies.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - run: pnpm install
      - run: pnpm --filter @orche/review tauri build --no-bundle

      # Package the raw binary as the CLI expects: a tar.gz containing
      # orche-review/orche-review (review-manager.ts → BIN_DIR/orche-review/orche-review).
      - name: Package
        run: |
          mkdir -p stage/orche-review
          cp packages/review/src-tauri/target/release/orche-review stage/orche-review/
          tar -C stage -czf orche-review-linux-x64.tar.gz orche-review

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: orche-review-linux-x64.tar.gz
